<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arranjo de Oradores</title>
  
  <!-- Importação da fonte Cabin -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Cabin', sans-serif;
      background-color: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* --- PAINEL DE CONTROLE RESPONSIVO (TELA) --- */
    .control-bar {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      margin-bottom: 15px;
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .sync-btn, .print-btn {
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Cabin', sans-serif;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
      width: 100%;
      text-align: center;
    }
    
    .sync-btn { background-color: #4b5563; }
    .sync-btn:hover { background-color: #374151; }
    
    .print-btn { background-color: #2563eb; }
    .print-btn:hover { background-color: #1d4ed8; }

    .seletor-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
      color: #3d2411;
      width: 100%;
    }
    
    .seletor-semana {
      font-family: 'Cabin', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #2563eb;
      color: #3d2411;
      background-color: white;
      cursor: pointer;
      outline: none;
      width: 100%;
    }

    /* --- LAYOUT ADAPTÁVEL PARA TELA DO CELULAR --- */
    .a4-page {
      width: 100%;
      max-width: 600px;
      background-color: #ffffff;
      padding: 20px 15px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    
    .title-container {
      text-align: center;
    }
    
    .title-container h1 {
      font-size: 30px;
      font-weight: 700;
      color: #000000;
      padding-bottom: 6px;
      display: inline-block;
      border-bottom: 3px solid #000000;
      text-transform: uppercase;
      width: 100%;
    }
    
    /* Cards Adaptáveis */
    .card {
      border-radius: 25px;
      padding: 20px 15px;
      width: 100%;
    }
    
    .card-header {
      background-color: #d6dbd7;
      text-align: center;
      font-size: 16px;
      line-height: 1.6;
      color: #000000;
      box-shadow: none;
      border: 1px solid rgba(0,0,0,0.1);
    }
    .card-header div {
      margin-bottom: 4px;
    }
    
    .card-title {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 15px;
      letter-spacing: 0.5px;
      color: #000000;
    }
    
    .card-receberemos { background-color: #cee0e4; }
    .card-enviaremos { background-color: #e4bbb0; }
    
    /* Linhas de programação */
    .schedule-item {
      margin-bottom: 15px;
      font-size: 16px;
      border-bottom: 1px dashed rgba(0,0,0,0.15);
      padding-bottom: 12px;
    }
    .schedule-item:last-child {
      margin-bottom: 0;
      border-bottom: none;
      padding-bottom: 0;
    }
    
    .item-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      color: #000000;
      margin-bottom: 6px;
    }
    
    .theme-container {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    
    .item-theme {
      color: #000000;
      flex-grow: 1;
      line-height: 1.4;
    }
    
    .theme-text-blue { color: #1a4f63; font-weight: 600; }
    .theme-text-red { color: #7a2014; font-weight: 600; }
    
    /* Botões Interativos */
    .no-print { display: flex; }
    
    .add-btn {
      background-color: #2563eb;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Cabin', sans-serif;
      font-size: 13px;
      font-weight: 600;
      margin-top: 12px;
      transition: background 0.2s;
      width: 100%;
      justify-content: center;
    }
    .add-btn:hover { background-color: #1d4ed8; }
    
    .remove-btn {
      background: none;
      border: none;
      color: #b91c1c;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .remove-btn:hover { opacity: 1; }

    [contenteditable="true"]:focus {
      outline: 2px dashed #2563eb;
      background-color: rgba(255, 255, 255, 0.5);
      border-radius: 4px;
    }
    
    .loading-msg {
      text-align: center;
      font-size: 15px;
      color: #1a4f63;
      padding: 10px;
      font-weight: 500;
    }

    /* --- 🖥️ AJUSTE PARA TELAS GRANDES (DESKTOP) --- */
    @media (min-width: 850px) {
      body { padding: 20px 0; }
      .control-bar { 
        max-width: 210mm; 
        flex-direction: row; 
        align-items: center; 
        justify-content: space-between;
        gap: 20px;
      }
      .sync-btn, .print-btn { width: auto; }
      .seletor-container { flex-direction: row; align-items: center; width: auto; }
      .seletor-semana { width: 220px; }
      
      .a4-page {
        width: 210mm;
        height: 297mm;
        max-width: none;
        padding: 15mm 15mm 20mm 15mm;
        gap: 25px;
      }
      .title-container h1 { font-size: 35px; width: 90%; }
      .card { padding: 20px 30px; border-radius: 35px; box-shadow: 5px 5px 8px 0px rgba(0, 0, 0, 0.3); }
      .card-header { font-size: 20px; box-shadow: 5px 5px 8px 0px rgba(0, 0, 0, 0.3); border: 0px; }
      .card-title { font-size: 30px; margin-bottom: 22px; }
      .schedule-item { font-size: 18px; margin-bottom: 15px; border-bottom: none; padding-bottom: 0; }
      .item-row { flex-direction: row; justify-content: space-between; margin-bottom: 3px; }
      .item-theme { margin-left: 13px; }
      .add-btn { width: auto; }
    }

    /* --- 🖨️ CONFIGURAÇÕES DE IMPRESSÃO RÍGIDA A4 --- */
    @media print {
      body { background-color: transparent; padding: 0; }
      .control-bar, .no-print { display: none !important; }
      .a4-page {
        width: 210mm !important;
        height: 297mm !important;
        max-width: none !important;
        box-shadow: none !important;
        padding: 15mm 15mm 20mm 15mm !important;
        margin: 0 !important;
        gap: 25px !important;
        page-break-after: always;
      }
      .title-container h1 { font-size: 35px !important; width: 90% !important; display: inline-block !important; }
      .card { padding: 20px 30px !important; border-radius: 35px !important; box-shadow: 5px 5px 8px 0px rgba(0, 0, 0, 0.3) !important; }
      .card-header { font-size: 20px !important; box-shadow: 5px 5px 8px 0px rgba(0, 0, 0, 0.3) !important; border: 0px !important; }
      .card-title { font-size: 30px !important; margin-bottom: 22px !important; }
      .schedule-item { font-size: 18px !important; margin-bottom: 15px !important; border-bottom: none !important; padding-bottom: 0 !important; }
      .item-row { flex-direction: row !important; justify-content: space-between !important; margin-bottom: 3px !important; }
      .item-theme { margin-left: 13px !important; }
    }
  </style>
</head>
<body>

  <!-- Painel unificado para controle e impressão em tela -->
  <div class="control-bar no-print">
    <div style="display: flex; gap: 10px; flex-grow: 1; flex-wrap: wrap;">
      <button class="sync-btn" style="flex: 1; min-width: 160px;" onclick="buscarDadosDaPlanilha()">🔄 Atualizar Planilha</button>
      <button class="print-btn" style="flex: 1; min-width: 160px;" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
    </div>
    
    <div class="seletor-container">
      <span>📅 Mostrar a partir da:</span>
      <select id="semana-select" class="seletor-semana" onchange="mudarSemanaInicial()">
        <option value="">Carregando semanas...</option>
      </select>
    </div>
  </div>

  <div class="a4-page">
    
    <!-- Título Principal com Linha -->
    <div class="title-container">
      <h1 contenteditable="true">DISCURSO PÚBLICO - MÊS</h1>
    </div>

    <!-- Card de Informações Gerais (Cinza-Esverdeado) -->
    <div class="card card-header">
      <div contenteditable="true"><strong>Congregação:</strong> —</div>
      <div contenteditable="true"><strong>Endereço:</strong> —</div>
      <div contenteditable="true"><strong>Horário:</strong> —</div>
    </div>

    <!-- Card RECEBEREMOS (Azul) -->
    <div class="card card-receberemos">
      <div class="card-title" contenteditable="true">RECEBEREMOS</div>
      <div id="container-receberemos">
        <div class="loading-msg">Carregando dados...</div>
      </div>
      <button class="add-btn no-print" onclick="adicionarSemanaManual('container-receberemos', 'blue')">+ Adicionar Semana</button>
    </div>

    <!-- Card ENVIAREMOS (Salmão) -->
    <div class="card card-enviaremos">
      <div class="card-title" contenteditable="true">ENVIAREMOS</div>
      <div id="container-enviaremos">
        <div class="loading-msg">Carregando dados...</div>
      </div>
      <button class="add-btn no-print" onclick="adicionarSemanaManual('container-enviaremos', 'red')" style="background-color: #b91c1c;">+ Adicionar Semana</button>
    </div>

  </div>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSBuS_Qe2LkVH7QEPbSvoFn50e7I71Waljbuk8b2UR1wxGkYZMoeEZUy7Moy1DF4pMfRlRsn0tyNDu4/pub?output=csv";
    const TSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRGAcOIMZpt2HD2XMZWqEnV5QjF7322mxVRjI-s3hsGsSzAw6T45pGhCczn0tNzQUQeYcnQ4R3SCyAS/pub?gid=1453510933&single=true&output=tsv";

    const MAPA_COLUNAS = {
      semana: 0,
      oradorEnviaremos: 13,
      esbocoEnviaremos: 14,
      oradorReceberemos: 9,
      esbocoReceberemos: 10
    };

    let todasAsLinhasValidas = [];
    let dicionarioEsbocos = {};

    window.onload = buscarDadosDaPlanilha;

    async function buscarDadosDaPlanilha() {
      const seletor = document.getElementById('semana-select');
      document.getElementById('container-receberemos').innerHTML = '<div class="loading-msg">Sincronizando bancos de dados...</div>';
      document.getElementById('container-enviaremos').innerHTML = '<div class="loading-msg">Sincronizando bancos de dados...</div>';
      seletor.innerHTML = '<option value="">Carregando...</option>';

      try {
        const respostaTSV = await fetch(TSV_URL);
        if (!respostaTSV.ok) throw new Error("Erro ao acessar a lista de esboços.");
        const textoTSV = await respostaTSV.text();
        dicionarioEsbocos = processarTSV(textoTSV);

        const respostaCSV = await fetch(CSV_URL);
        if (!respostaCSV.ok) throw new Error("Erro ao acessar a planilha principal.");
        const textoCSV = await respostaCSV.text();
        const linhasRaw = processarCSV(textoCSV);

        todasAsLinhasValidas = [];

        if (linhasRaw.length <= 1) {
          document.getElementById('container-receberemos').innerHTML = '<div class="loading-msg">Nenhum dado encontrado.</div>';
          document.getElementById('container-enviaremos').innerHTML = '<div class="loading-msg">Nenhum dado encontrado.</div>';
          return;
        }

        for (let i = 1; i < linhasRaw.length; i++) {
          const col = linhasRaw[i];
          if (col && col.length > 0 && col[MAPA_COLUNAS.semana]) {
            todasAsLinhasValidas.push(col);
          }
        }

        seletor.innerHTML = '';
        todasAsLinhasValidas.forEach((col, index) => {
          const opcao = document.createElement('option');
          opcao.value = index;
          opcao.textContent = "Semana: " + col[MAPA_COLUNAS.semana];
          seletor.appendChild(opcao);
        });

        renderizarCardsIniciandoEm(0);

      } catch (erro) {
        console.error(erro);
        const erroHTML = `<div class="loading-msg" style="color:red;">⚠️ Falha ao carregar dados: ${erro.message}</div>`;
        document.getElementById('container-receberemos').innerHTML = erroHTML;
        document.getElementById('container-enviaremos').innerHTML = erroHTML;
      }
    }

    function mudarSemanaInicial() {
      const seletor = document.getElementById('semana-select');
      const indiceEscolhido = parseInt(seletor.value, 10) || 0;
      renderizarCardsIniciandoEm(indiceEscolhido);
    }

    function renderizarCardsIniciandoEm(indiceInicial) {
      const containerReceberemos = document.getElementById('container-receberemos');
      const containerEnviaremos = document.getElementById('container-enviaremos');
      
      containerReceberemos.innerHTML = '';
      containerEnviaremos.innerHTML = '';

      let cardsExibidos = 0;

      for (let i = indiceInicial; i < todasAsLinhasValidas.length; i++) {
        if (cardsExibidos >= 4) break;

        const col = todasAsLinhasValidas[i];
        const dataSemana = col[MAPA_COLUNAS.semana] || "—";

        // RECEBEREMOS
        const oradorRec = col[MAPA_COLUNAS.oradorReceberemos] || "—";
        const numEsbocoRec = (col[MAPA_COLUNAS.esbocoReceberemos] || "").trim();
        let temaCompletoRec = "—";
        
        if (numEsbocoRec) {
          const temaEncontrado = dicionarioEsbocos[numEsbocoRec] || "Tema não localizado";
          temaCompletoRec = `${temaEncontrado} (${numEsbocoRec})`;
        }

        const itemRec = document.createElement('div');
        itemRec.className = 'schedule-item';
        itemRec.innerHTML = `
          <div class="item-row">
            <div contenteditable="true"><strong>Orador:</strong> ${oradorRec}</div>
            <div contenteditable="true"><strong>Data:</strong> ${dataSemana}</div>
          </div>
          <div class="theme-container">
            <div class="item-theme" contenteditable="true">
              <strong>Tema:</strong> <span class="theme-text-blue">${temaCompletoRec}</span>
            </div>
            <button class="remove-btn no-print" onclick="this.closest('.schedule-item').remove()" title="Remover semana">✕</button>
          </div>
        `;
        containerReceberemos.appendChild(itemRec);

        // ENVIAREMOS
        const oradorEnv = col[MAPA_COLUNAS.oradorEnviaremos] || "—";
        const numEsbocoEnv = (col[MAPA_COLUNAS.esbocoEnviaremos] || "").trim();
        let temaCompletoEnv = "—";

        if (numEsbocoEnv) {
          const temaEncontrado = dicionarioEsbocos[numEsbocoEnv] || "Tema não localizado";
          temaCompletoEnv = `${temaEncontrado} (${numEsbocoEnv})`;
        }

        const itemEnv = document.createElement('div');
        itemEnv.className = 'schedule-item';
        itemEnv.innerHTML = `
          <div class="item-row">
            <div contenteditable="true"><strong>Orador:</strong> ${oradorEnv}</div>
            <div contenteditable="true"><strong>Data:</strong> ${dataSemana}</div>
          </div>
          <div class="theme-container">
            <div class="item-theme" contenteditable="true">
              <strong>Tema:</strong> <span class="theme-text-red">${temaCompletoEnv}</span>
            </div>
            <button class="remove-btn no-print" onclick="this.closest('.schedule-item').remove()" title="Remover semana">✕</button>
          </div>
        `;
        containerEnviaremos.appendChild(itemEnv);

        cardsExibidos++;
      }
    }

    function processarTSV(texto) {
      const linhas = texto.split(/\r?\n/);
      const mapa = {};
      linhas.forEach(linha => {
        const colunas = linha.split('\t');
        if (colunas.length >= 2) {
          const numero = colunas[0].replace(/^"|"$/g, '').trim();
          const tema = colunas[1].replace(/^"|"$/g, '').trim();
          if (numero) {
            mapa[numero] = tema;
          }
        }
      });
      return mapa;
    }

    function processarCSV(texto) {
      const linhas = texto.split(/\r?\n/);
      const primeiraLinha = linhas[0] || "";
      const divisor = (primeiraLinha.split(';').length > primeiraLinha.split(',').length) ? ';' : ',';

      return linhas.map(linha => {
        const regex = new RegExp(`${divisor}(?=(?:(?:[^"]*"){2})*[^"]*$)`);
        return linha.split(regex).map(celula => 
          celula ? celula.replace(/^"|"$/g, '').trim() : ""
        );
      });
    }

    function adicionarSemanaManual(containerId, tipoCor) {
      const container = document.getElementById(containerId);
      const novaSemana = document.createElement('div');
      novaSemana.className = 'schedule-item';
      const corClasse = tipoCor === 'blue' ? 'theme-text-blue' : 'theme-text-red';
      
      novaSemana.innerHTML = `
        <div class="item-row">
          <div contenteditable="true"><strong>Orador:</strong> Nome do Irmão</div>
          <div contenteditable="true"><strong>Data:</strong> 00 de Mês</div>
        </div>
        <div class="theme-container">
          <div class="item-theme" contenteditable="true">
            <strong>Tema:</strong> <span class="${corClasse}">Título do discurso aqui (00)</span>
          </div>
          <button class="remove-btn no-print" onclick="this.closest('.schedule-item').remove()" title="Remover semana">✕</button>
        </div>
      `;
      container.appendChild(novaSemana);
    }
  </script>

</body>
</html>
